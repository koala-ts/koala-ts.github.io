name: Redeploy All Docs
description: Redeploy all configured docs branches in declared order.

inputs:
  registry_json:
    description: Optional registry payload override for orchestration
    required: false
  github_token:
    description: Token used to clone and push the gh-pages branch
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Redeploy all docs branches
      shell: bash
      env:
        RELEASE_REGISTRY_JSON: ${{ inputs.registry_json || 'release-registry.json' }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        REMOTE_BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | paste -sd ',' -)

        REDEPLOY_JSON=$(
          node release-policy/node.js redeploy-all \
            --registry-source "${RELEASE_REGISTRY_JSON}" \
            --existing-branches "${REMOTE_BRANCHES}" \
            --github-output "$GITHUB_OUTPUT"
        )

        BRANCH_CSV=$(
          node -e '
            const result = JSON.parse(process.argv[1]);
            const branchCsv = result.deployments
              .map((deployment) => deployment.currentBranch)
              .join(",");
            process.stdout.write(branchCsv);
          ' "${REDEPLOY_JSON}"
        )

        IFS=',' read -r -a BRANCHES <<< "${BRANCH_CSV}"

        for branch in "${BRANCHES[@]}"; do
          TARGET_BRANCH="${branch}" WRITE_GITHUB_OUTPUT='false' ./release-policy/github-actions/shared/deploy-docs-branch.sh
        done
