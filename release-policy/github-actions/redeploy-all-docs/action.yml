name: Redeploy All Docs
description: Redeploy all configured docs branches in declared order.

inputs:
  site_base:
    description: GitHub Pages site base path
    required: false
  site_url:
    description: Published site URL
    required: false
  canonical_branch:
    description: Branch that owns the canonical homepage and docs URLs
    required: false
  deployable_branches:
    description: Comma-separated deployable branches in publish order
    required: false
  github_token:
    description: Token used to clone and push the gh-pages branch
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Redeploy all docs branches
      shell: bash
      env:
        SITE_BASE: ${{ inputs.site_base || '/' }}
        SITE_URL: ${{ inputs.site_url }}
        CANONICAL_BRANCH: ${{ inputs.canonical_branch || github.event.repository.default_branch }}
        DEPLOYABLE_BRANCHES: ${{ inputs.deployable_branches || inputs.canonical_branch || github.event.repository.default_branch }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        REMOTE_BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | paste -sd ',' -)

        REDEPLOY_JSON=$(
          node release-policy/node.js redeploy-all \
            --canonical-branch "${CANONICAL_BRANCH}" \
            --deployable-branches "${DEPLOYABLE_BRANCHES}" \
            --existing-branches "${REMOTE_BRANCHES}" \
            --github-output "$GITHUB_OUTPUT"
        )

        BRANCH_CSV=$(
          node -e '
            const result = JSON.parse(process.argv[1]);
            const branchCsv = result.deployments
              .map((deployment) => deployment.currentBranch)
              .join(",");
            process.stdout.write(branchCsv);
          ' "${REDEPLOY_JSON}"
        )

        IFS=',' read -r -a BRANCHES <<< "${BRANCH_CSV}"

        for branch in "${BRANCHES[@]}"; do
          SITE_BASE="${SITE_BASE}" \
          SITE_URL="${SITE_URL}" \
          CANONICAL_BRANCH="${CANONICAL_BRANCH}" \
          DEPLOYABLE_BRANCHES="${DEPLOYABLE_BRANCHES}" \
          TARGET_BRANCH="${branch}" \
          WRITE_GITHUB_OUTPUT='false' \
          ./release-policy/github-actions/shared/deploy-docs-branch.sh
        done
