name: Deploy Docs Branch
description: Deploy one docs branch to gh-pages using the local release policy.

inputs:
  site_base:
    description: GitHub Pages site base path
    required: false
  site_url:
    description: Published site URL
    required: false
  canonical_branch:
    description: Branch that owns the canonical homepage and docs URLs
    required: false
  deployable_branches:
    description: Comma-separated deployable branches in publish order
    required: false
  target_branch:
    description: Branch to deploy
    required: true
  github_token:
    description: Token used to clone and push the gh-pages branch
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Deploy docs branch
      shell: bash
      env:
        SITE_BASE: ${{ inputs.site_base || '/' }}
        SITE_URL: ${{ inputs.site_url }}
        CANONICAL_BRANCH: ${{ inputs.canonical_branch || github.event.repository.default_branch }}
        DEPLOYABLE_BRANCHES: ${{ inputs.deployable_branches || inputs.canonical_branch || github.event.repository.default_branch }}
        TARGET_BRANCH: ${{ inputs.target_branch }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        WRITE_GITHUB_OUTPUT: 'true'
      run: ./release-policy/github-actions/shared/deploy-docs-branch.sh
