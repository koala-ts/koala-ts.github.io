site_name: KoalaTs
site_description: KoalaTs landing page and versioned documentation
site_url: https://koala-ts.github.io
docs_dir: mkdocs/docs
site_dir: build/mkdocs
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - search.suggest
    - search.highlight
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
extra_css:
  - stylesheets/landing.css
nav:
  - Home: index.md
  - Docs:
      - "2.x":
          - Overview:
              - Introduction: docs/2.x/overview/intro.md
          - Getting Started:
              - Quick Start: docs/2.x/getting-started/quick-start.md
          - Fundamentals:
              - Routing: docs/2.x/fundamentals/routing.md
              - Request: docs/2.x/fundamentals/request.md
              - Response: docs/2.x/fundamentals/response.md
          - Guides:
              - Configuration: docs/2.x/guides/configuration.md
              - Serving Static Files: docs/2.x/guides/static-files.md
          - Utilities:
              - Request Scope Store: docs/2.x/utilities/request-scope-store.md
