name: Deploy Docs Branch
description: Deploy one docs branch to gh-pages using the local release policy.

inputs:
  target_branch:
    description: Branch to deploy
    required: true
  registry_json:
    description: Optional registry payload override for internal orchestration
    required: false
  github_token:
    description: Token used to clone and push the gh-pages branch
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Deploy docs branch
      shell: bash
      env:
        RELEASE_REGISTRY_JSON: ${{ inputs.registry_json || 'release-registry.json' }}
        TARGET_BRANCH: ${{ inputs.target_branch }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        WRITE_GITHUB_OUTPUT: 'true'
      run: ./.github/actions/shared/deploy-docs-branch.sh
