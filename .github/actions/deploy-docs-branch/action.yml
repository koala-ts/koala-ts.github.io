name: Deploy Docs Branch
description: Deploy one docs branch to gh-pages using the local release policy.

inputs:
  target_branch:
    description: Branch to deploy
    required: true
  registry_json:
    description: Optional registry payload override for internal orchestration
    required: false
  github_token:
    description: Token used to clone and push the gh-pages branch
    required: true

runs:
  using: composite
  steps:
    - name: Checkout workflow branch
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Resolve branch deployment gate
      id: deploy
      shell: bash
      env:
        RELEASE_REGISTRY_JSON: ${{ inputs.registry_json || 'release-registry.json' }}
      run: |
        REMOTE_BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | paste -sd ',' -)

        node release-policy/node.js deploy-branch \
          "${{ inputs.target_branch }}" \
          --registry-source "${RELEASE_REGISTRY_JSON}" \
          --existing-branches "${REMOTE_BRANCHES}" \
          --github-output "$GITHUB_OUTPUT"

    - name: Skip missing branch
      if: steps.deploy.outputs.should_skip == 'true'
      shell: bash
      run: |
        echo "${{ steps.deploy.outputs.skip_reason }}"

    - name: Checkout source branch
      if: steps.deploy.outputs.should_skip != 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.target_branch }}
        path: source

    - name: Setup source Node.js cache
      if: steps.deploy.outputs.should_skip != 'true'
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: source/package-lock.json

    - name: Install source dependencies
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      working-directory: source
      run: npm ci

    - name: Prepare gh-pages workspace
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if git ls-remote --exit-code --heads origin gh-pages; then
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" .gh-pages
        else
          mkdir -p .gh-pages
          cd .gh-pages
          git init
          git checkout --orphan gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        fi

    - name: Resolve site base
      id: site
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      run: |
        if [ -f .gh-pages/CNAME ]; then
          DOMAIN=$(head -n 1 .gh-pages/CNAME | tr -d '[:space:]')
          echo "site_url=https://${DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "site_base=/" >> "$GITHUB_OUTPUT"
        else
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_LC=$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "site_url=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_OUTPUT"
          if [ "${REPO_LC}" = "${OWNER_LC}.github.io" ]; then
            echo "site_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "site_base=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Prepare branch deployment
      id: prepared
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      env:
        RELEASE_REGISTRY_JSON: ${{ inputs.registry_json || 'release-registry.json' }}
      run: |
        mkdir -p .gh-pages/docs
        REMOTE_BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | paste -sd ',' -)

        node release-policy/node.js deploy-branch \
          "${{ inputs.target_branch }}" \
          --registry-source "${RELEASE_REGISTRY_JSON}" \
          --existing-branches "${REMOTE_BRANCHES}" \
          --site-base "${{ steps.site.outputs.site_base }}" \
          --catalog-path ".gh-pages/docs/versions.json" \
          --manifest-path ".gh-pages/docs/doc-paths.json" \
          --docs-dir "source/docs" \
          --github-output "$GITHUB_OUTPUT"

    - name: Build Docusaurus site
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      working-directory: source
      env:
        DOCS_CURRENT_BRANCH: ${{ steps.prepared.outputs.current_branch }}
        DOCS_DEFAULT_BRANCH: ${{ steps.prepared.outputs.default_branch }}
        DOCS_VERSION: ${{ steps.prepared.outputs.version_slug }}
        DOCS_VERSIONS: ${{ steps.prepared.outputs.version_csv }}
        DOCS_SITE_BASE: ${{ steps.site.outputs.site_base }}
        DOCS_BASE_URL: ${{ steps.prepared.outputs.build_base_url }}
        DOCS_ROUTE_BASE_PATH: ${{ steps.prepared.outputs.docs_route_base_path }}
        SITE_URL: ${{ steps.site.outputs.site_url }}
      run: npm run build

    - name: Publish default branch site ownership
      if: steps.deploy.outputs.should_skip != 'true' && steps.prepared.outputs.is_default_branch == 'true'
      shell: bash
      run: |
        rm -rf "${{ steps.prepared.outputs.versioned_docs_dir }}"

        rsync -a --delete \
          --exclude .git \
          --exclude '.git/***' \
          --exclude docs \
          --exclude 'docs/***' \
          --exclude CNAME \
          source/build/ .gh-pages/

        VERSION_EXCLUDES=$(printf '%s\n' "${{ steps.prepared.outputs.version_csv }}" | tr ',' '\n' | sed '/^$/d' | sed 's#^#--exclude=#')

        mkdir -p .gh-pages/docs
        rsync -a --delete \
          --exclude .git \
          --exclude '.git/***' \
          --exclude=versions.json \
          --exclude=doc-paths.json \
          ${VERSION_EXCLUDES} \
          source/build/docs/ .gh-pages/docs/

    - name: Publish non-default branch docs
      if: steps.deploy.outputs.should_skip != 'true' && steps.prepared.outputs.is_default_branch != 'true'
      shell: bash
      run: |
        mkdir -p "${{ steps.prepared.outputs.publish_target_dir }}"
        rsync -a --delete \
          --exclude .git \
          --exclude '.git/***' \
          "source/${{ steps.prepared.outputs.publish_source_dir }}/" \
          "${{ steps.prepared.outputs.publish_target_dir }}/"

    - name: Commit and push gh-pages
      if: steps.deploy.outputs.should_skip != 'true'
      shell: bash
      working-directory: .gh-pages
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --cached --quiet; then
          echo "No changes to publish"
          exit 0
        fi
        git commit -m "chore: publish docs ${{ steps.prepared.outputs.version_slug }}"
        git pull --rebase origin gh-pages || true
        git push origin HEAD:gh-pages
