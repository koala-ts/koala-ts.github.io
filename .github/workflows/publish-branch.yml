name: 🚀 Deploy Selected Docs Branch
run-name: Deploy docs for ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy selected docs branch
        uses: ./.github/actions/deploy-docs-branch
        with:
          target_branch: ${{ github.ref_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
