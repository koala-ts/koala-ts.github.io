name: 🚀 Deploy Selected Docs Branch
run-name: Deploy docs for ${{ github.ref_name }}

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deploy selected docs branch
        uses: ./release-policy/github-actions/deploy-docs-branch
        with:
          site_base: /
          canonical_branch: ${{ github.event.repository.default_branch }}
          deployable_branches: 1.x,2.x,main
          target_branch: ${{ github.ref_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
