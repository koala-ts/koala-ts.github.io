name: Publish Branch Docs Internal
run-name: Publish ${{ inputs.target_branch }}

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Deployable branch to publish
        required: true
        type: string
      registry_json:
        description: Optional release-registry snapshot
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    uses: ./.github/workflows/publish-branch-runner.yml
    with:
      target_branch: ${{ inputs.target_branch }}
      registry_json: ${{ inputs.registry_json }}
    secrets: inherit
