name: CI

on:
  push:
    branches:
      - main
      - "*.x"

  pull_request:
    branches:
      - main
      - "*.x"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DOCS_CURRENT_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      DOCS_DEFAULT_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint

      - name: Test runtime helpers
        run: npm test

      - name: Build documentation
        run: npm run build
