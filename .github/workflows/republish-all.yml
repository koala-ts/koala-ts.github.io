name: 🚀 Deploy All Deployable Docs Branches
run-name: Deploy all deployable docs branches

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages-republish-all
  cancel-in-progress: false

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Redeploy all docs branches
        uses: ./release-policy/github-actions/redeploy-all-docs
        with:
          site_base: /
          canonical_branch: ${{ github.event.repository.default_branch }}
          deployable_branches: 1.x,2.x,main
          github_token: ${{ secrets.GITHUB_TOKEN }}
