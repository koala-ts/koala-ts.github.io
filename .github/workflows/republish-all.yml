name: 🚀 Deploy All Deployable Docs Branches
run-name: Deploy all deployable docs branches

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: docs-pages-republish-all
  cancel-in-progress: false

jobs:
  republish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve release registry snapshot
        id: registry
        run: |
          REMOTE_BRANCHES=$(git ls-remote --heads origin | awk '{print $2}' | sed 's#refs/heads/##' | paste -sd ',' -)

          node release-policy/index.js redeploy-all \
            --registry-source "release-registry.json" \
            --existing-branches "${REMOTE_BRANCHES}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Republish branches in declared order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYABLE_BRANCH_CSV: ${{ steps.registry.outputs.branch_csv }}
          REGISTRY_JSON: ${{ steps.registry.outputs.registry_json }}
        run: |
          IFS=',' read -r -a BRANCHES <<< "${DEPLOYABLE_BRANCH_CSV}"

          for branch in "${BRANCHES[@]}"; do
            run_name="Deploy docs for ${branch}"
            dispatched_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            gh workflow run publish-branch-internal.yml \
              --ref "${GITHUB_REF_NAME}" \
              -f target_branch="${branch}" \
              -f registry_json="${REGISTRY_JSON}"

            run_id=""

            for attempt in $(seq 1 10); do
              runs_json=$(gh run list \
                --workflow publish-branch-internal.yml \
                --event workflow_dispatch \
                --json databaseId,displayTitle,createdAt)

              run_id=$(
                node -e '
                  const runs = JSON.parse(process.argv[1]);
                  const runName = process.argv[2];
                  const dispatchedAt = Date.parse(process.argv[3]);
                  const match = runs
                    .filter((run) => run.displayTitle === runName)
                    .filter((run) => Date.parse(run.createdAt) >= dispatchedAt)
                    .sort((left, right) => Date.parse(right.createdAt) - Date.parse(left.createdAt))[0];
                  if (match) {
                    process.stdout.write(String(match.databaseId));
                  }
                ' \
                "${runs_json}" \
                "${run_name}" \
                "${dispatched_at}"
              )

              if [ -n "${run_id}" ]; then
                break
              fi

              sleep 180
            done

            if [ -z "${run_id}" ]; then
              echo "Failed to find child publish run for ${branch}"
              exit 1
            fi

            gh run watch "${run_id}" --exit-status
          done
