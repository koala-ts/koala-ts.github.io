name: Docs Branch Deploy Runner

on:
  workflow_call:
    inputs:
      target_branch:
        required: true
        type: string
      registry_json:
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: docs-pages-publish-branch
  cancel-in-progress: false

jobs:
  publish:
    name: Deploy docs for ${{ inputs.target_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deploy docs branch
        uses: ./.github/actions/deploy-docs-branch
        with:
          target_branch: ${{ inputs.target_branch }}
          registry_json: ${{ inputs.registry_json }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
